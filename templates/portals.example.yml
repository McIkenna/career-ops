# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  - name: Ashby — Frontend & Software Roles
    query: 'site:jobs.ashbyhq.com "Frontend" OR "Software Engineer"'
    enabled: true

  - name: Ashby — Junior & Entry Roles
    query: 'site:jobs.ashbyhq.com "Junior Developer" OR "Entry Level Software Engineer"'
    enabled: true

  - name: Ashby — React & UI Roles
    query: 'site:jobs.ashbyhq.com "React Developer" OR "Frontend Engineer"'
    enabled: true

  - name: Greenhouse — Frontend Roles
    query: 'site:boards.greenhouse.io "Frontend Engineer" OR "Frontend Developer"'
    enabled: true

  - name: Greenhouse — Software Engineer Roles
    query: 'site:boards.greenhouse.io "Software Engineer" OR "Full Stack Engineer"'
    enabled: true

  - name: Greenhouse — Junior Developer Roles
    query: 'site:boards.greenhouse.io "Junior Developer" OR "Entry Level Developer"'
    enabled: true

  - name: Lever — Frontend Roles
    query: 'site:jobs.lever.co "Frontend Engineer" OR "Frontend Developer"'
    enabled: true

  - name: Lever — Software Engineer Roles
    query: 'site:jobs.lever.co "Software Engineer" OR "Full Stack Developer"'
    enabled: true

  - name: Lever — Junior Roles
    query: 'site:jobs.lever.co "Junior Software Engineer" OR "Junior Developer"'
    enabled: true

  - name: Workday — Frontend Jobs
    query: 'site:wd1.myworkdayjobs.com "Frontend Engineer" OR "Frontend Developer"'
    enabled: true

  - name: Workday — Software Engineer Jobs
    query: 'site:wd1.myworkdayjobs.com "Software Engineer" OR "Software Developer"'
    enabled: true

  - name: Workday — Entry Level Jobs
    query: 'site:wd1.myworkdayjobs.com "Junior Developer" OR "Entry Level Software Engineer"'
    enabled: true

  - name: SmartRecruiters — Frontend Roles
    query: 'site:jobs.smartrecruiters.com "Frontend Engineer" OR "Frontend Developer"'
    enabled: true

  - name: SmartRecruiters — Software Roles
    query: 'site:jobs.smartrecruiters.com "Software Engineer" OR "Full Stack Engineer"'
    enabled: true

  - name: SmartRecruiters — Junior Roles
    query: 'site:jobs.smartrecruiters.com "Junior Developer" OR "Junior Software Engineer"'
    enabled: true

  - name: BambooHR — Frontend Roles
    query: 'site:boards.bamboohr.com "Frontend Developer" OR "Frontend Engineer"'
    enabled: true

  - name: BambooHR — Software Roles
    query: 'site:boards.bamboohr.com "Software Engineer" OR "Backend Developer"'
    enabled: true

  - name: BambooHR — Entry Roles
    query: 'site:boards.bamboohr.com "Junior Developer" OR "Entry Level Developer"'
    enabled: true

  - name: AngelList Talent — Startup Roles
    query: 'site:wellfound.com "Frontend Engineer" OR "Software Engineer"'
    enabled: true

  - name: AngelList Talent — Junior Startup Roles
    query: 'site:wellfound.com "Junior Developer" OR "Entry Level Software Engineer"'
    enabled: true
  

